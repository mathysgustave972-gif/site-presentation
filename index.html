<html lang="fr"></html>
    <head>
        <meta charset="utf-8">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </head>
    <body> 
       <table class="table table-striped table-hover">
            <thead>
                <tr>
                    <th>Nom</th>
                    <th>Prénom</th>
                    <th>Email</th>
                </tr>
            </thead>
            <tbody id="tableau">
                <script>
                // GET REQUEST
                document.addEventListener("DOMContentLoaded", function () {

                    var req;
                    req = new XMLHttpRequest();

                    req.open(
                        "GET",
                        "http://192.168.1.224/ciel2027/api/etudiants",
                        true
                    );
                    
                    req.send();
                    

                    req.onload = function () {

                        var json = JSON.parse(req.responseText);
                        var html = "";

                        // loop and display data
                        json.forEach(function (val) {

                            html += "<tr>";
                            html += "<td>" + "<a href=./update_etudiant.html?id=" + val['id'] + ">" + val['nom'] + "</a>" + "</td>";
                            html += "<td>" + val["prenom"] + "</td>";
                            html += "<td>" + val["email"] + "</td>";
                            html += "</tr>";

                        });

                        // append in tbody
                        document.getElementById("tableau").innerHTML = html;
                    };

                });
                </script>
            </tbody>
        </table>
        <button type="button" class="btn btn-success" onclick="window.location.href = 'create_etudiant.html';">
            Inscrire un étudiant
        </button>
    </body>
</html>
